<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SmartFinance</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Flatpickr via CDN for better date styling -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                SmartFinance
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active" onclick="switchTab('dashboard', this)">Dashboard</li>
                    <li onclick="switchTab('expenses', this)">Expenses</li>
                </ul>
            </nav>
            <div style="margin-top: auto;">
                <div style="margin-bottom: 1rem; color: var(--text-muted); font-size: 0.9rem;">
                    Logged in as <b id="userNameDisplay">User</b>
                </div>
                <button onclick="logout()" class="btn btn-outline" style="width: 100%;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h1 id="pageTitle">Financial Overview</h1>
                <button class="btn btn-primary" onclick="openAddExpenseModal()">Add Expense</button>
            </header>

            <!-- Dashboard Tab -->
            <div id="tab-dashboard">
                <div class="summary-cards">
                    <div class="summary-card glass">
                        <h4>Total Expenses (Month)</h4>
                        <div class="value text-danger" id="summaryTotalMonth">₹0</div>
                    </div>
                    <div class="summary-card glass">
                        <h4>Expenses (Week)</h4>
                        <div class="value text-warning" id="summaryTotalWeek">₹0</div>
                    </div>
                    <div class="summary-card glass">
                        <h4>Highest Category</h4>
                        <div class="value" style="color: var(--primary);" id="summaryHighestCat">N/A</div>
                    </div>
                </div>

                <div id="insightsContainer" style="margin-bottom: 2rem;"></div>

                <div class="charts-grid">
                    <div class="chart-container glass">
                        <h3 style="margin-bottom: 1rem;">Category Breakdown</h3>
                        <canvas id="categoryPieChart"></canvas>
                    </div>
                    <div class="chart-container glass">
                        <h3 style="margin-bottom: 1rem;">Weekly Trend</h3>
                        <canvas id="weeklyLineChart"></canvas>
                    </div>
                </div>

                <div class="table-container glass">
                    <h3 style="margin-bottom: 1rem;">Recent Transactions</h3>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody id="recentTransactionsTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Expenses Tab -->
            <div id="tab-expenses" class="hidden">
                <!-- Filter Bar -->
                <div class="glass filter-bar" style="padding: 1.25rem 1.5rem; border-radius: 1rem; margin-bottom: 1.5rem;">
                    <div class="filter-grid">
                        <div class="filter-group">
                            <label class="filter-label">Category</label>
                            <select id="filterCategory" class="input-field filter-input" onchange="applyFilters()">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">From Date</label>
                            <input type="date" id="filterDateFrom" class="input-field filter-input" oninput="applyFilters()">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">To Date</label>
                            <input type="date" id="filterDateTo" class="input-field filter-input" oninput="applyFilters()">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Min Amount (&#8377;)</label>
                            <input type="number" id="filterAmountMin" class="input-field filter-input" placeholder="0" oninput="applyFilters()">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Max Amount (&#8377;)</label>
                            <input type="number" id="filterAmountMax" class="input-field filter-input" placeholder="Any" oninput="applyFilters()">
                        </div>
                        <div class="filter-group" style="display:flex; align-items: flex-end;">
                            <button class="btn btn-outline" style="width:100%;" onclick="clearFilters()">Clear Filters</button>
                        </div>
                    </div>
                    <div id="filterSummary" style="margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-muted);"></div>
                </div>
                <!-- Expenses Table -->
                <div class="glass table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Amount</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="expensesTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Add Expense Modal -->
    <div id="addExpenseModal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <h2 style="margin-bottom: 1.5rem;">Add New Expense</h2>
            <form id="addExpenseForm">
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="expDesc" class="input-field" required>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" step="0.01" id="expAmount" class="input-field" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="expCat" list="categoryList" class="input-field" placeholder="Select or type new category..." required>
                    <datalist id="categoryList">
                        <!-- Populated by JS -->
                    </datalist>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="expDate" class="input-field flatpickr-date" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeAddExpenseModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Expense</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
